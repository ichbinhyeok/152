name: Deploy LL152 Guide to OCI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ll152guide-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
          OCI_KEY: ${{ secrets.OCI_KEY }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          for secret_name in DOCKERHUB_USERNAME DOCKERHUB_TOKEN OCI_HOST OCI_USERNAME OCI_KEY APP_ADMIN_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle Wrapper executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            shinhyeok22/152:latest
            shinhyeok22/152:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload deploy assets to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          source: "docker-compose.yml"
          target: "~/deploy/ll152guide/release"
          overwrite: true

      - name: Deploy on OCI host
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          APP_ADMIN_USERNAME: ${{ secrets.APP_ADMIN_USERNAME }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,APP_ADMIN_USERNAME,APP_ADMIN_PASSWORD
          script: |
            set -euo pipefail

            APP_DIR="$HOME/deploy/ll152guide"
            RELEASE_DIR="$APP_DIR/release"
            HOST_PORT="${{ vars.OCI_APP_PORT }}"
            APP_ADMIN_USERNAME_VALUE="${APP_ADMIN_USERNAME:-admin}"
            if [ -z "$HOST_PORT" ]; then
              HOST_PORT="8099"
            fi

            mkdir -p "$APP_DIR/storage"
            cp "$RELEASE_DIR/docker-compose.yml" "$APP_DIR/docker-compose.yml"

            {
              printf '%s\n' 'IMAGE_NAME=shinhyeok22/152:latest'
              printf 'HOST_PORT=%s\n' "$HOST_PORT"
              printf '%s\n' 'SPRING_PROFILES_ACTIVE=prod'
              printf 'APP_ADMIN_USERNAME=%s\n' "$APP_ADMIN_USERNAME_VALUE"
              printf 'APP_ADMIN_PASSWORD=%s\n' "$APP_ADMIN_PASSWORD"
              printf '%s\n' 'APP_STORAGE_ROOT=/app/storage'
              printf '%s\n' 'JAVA_OPTS=-XX:+UseG1GC -Xms256m -Xmx512m -Djava.security.egd=file:/dev/./urandom'
            } > "$APP_DIR/.env"

            if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
              echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            fi

            cd "$APP_DIR"
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps

            for attempt in $(seq 1 24); do
              if curl -fsS "http://127.0.0.1:${HOST_PORT}/robots.txt" >/dev/null; then
                echo "LL152 Guide container health passed on attempt $attempt."
                break
              fi

              echo "Container health not ready yet, attempt $attempt/24."
              sleep 5
            done

            if ! curl -fsS "http://127.0.0.1:${HOST_PORT}/robots.txt" >/dev/null; then
              echo "LL152 Guide container health check failed after deploy."
              docker compose logs --tail=200 app
              exit 1
            fi

            if curl -kfsSL --resolve ll152guide.com:443:127.0.0.1 "https://ll152guide.com/" > /tmp/ll152guide-public-check.html; then
              if ! grep -qi "LL152 Guidance Desk" /tmp/ll152guide-public-check.html; then
                echo "HTTPS host-routed public check did not return LL152 Guide content."
                sed -n '1,120p' /tmp/ll152guide-public-check.html
                exit 1
              fi
              echo "HTTPS host-routed public check returned LL152 Guide content."
            else
              echo "Skipped HTTPS host-routed public check because local nginx/TLS was not reachable on the OCI host."
            fi
