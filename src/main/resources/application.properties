spring.application.name=nycll152
server.shutdown=graceful
server.forward-headers-strategy=framework

app.base-url=https://ll152guide.com
app.storage-root=storage
app.public-indexing-enabled=true
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:change-me-before-deploy}
app.rate-limit.enabled=true
app.rate-limit.checker-per-minute=60
app.rate-limit.leads-per-hour=12
app.rate-limit.events-per-minute=180

gg.jte.developmentMode=false
gg.jte.usePrecompiledTemplates=true
